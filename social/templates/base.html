{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectHub</title>
</head>
<body>
    <header>
        <h1>Welcome to ConnectHub</h1>
        <nav>
            {% if user.is_authenticated %}
                <a href="{% url 'feed' %}">Feed</a> |
                <a href="{% url 'discover' %}">Discover</a> |
                <a href="{% url 'my_profile' %}">My Profile</a> |

                <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit">Logout</button>
                </form>

                <form method="get" action="{% url 'search' %}" style="margin-top:10px;">
                <input type="text" name="q" placeholder="Search users or posts" required>
                <button type="submit">Search</button>
                </form>

            {% else %}
                <a href="{% url 'home' %}">home</a> |
                <a href="{% url 'login' %}">Login</a> |
                <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </nav>
    </header>
    <hr>
    {% block content %}
    {% endblock %}
</body>
</html>
