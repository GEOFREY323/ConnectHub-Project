{% extends 'base.html' %}
{% block content %}
  <di class="new-feed">
    <h1>Your Feed</h1>
    <p><a class="new-post" href="{% url 'create_post' %}">Add Post</a></p>
  </di>
  {% for post in posts %}
      {% include 'social/post_card.html' with post=post %}
  {% empty %}
      <p>No posts to show. Follow some users to see their posts here!</p>
  {% endfor %}
{% endblock %}
