{% extends "base.html" %} 
<div class="register">
  {% block content %}
    <h2>Create an Account</h2>
    {% if messages %}
      {% for message in messages %}
        <p style='color:red;'>{{ message }}</p>
      {% endfor %}
    {% endif %}
    <form method='POST'>
      {% csrf_token %}
      {{ form.as_p }}
      <button type='submit' class="edit-post">Register</button>
    </form>
    <p>Already have an account? <a href="{% url 'login' %}" class='btn'>Login here </a></p>
    {% endblock %}
</div>
